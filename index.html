<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>夏屿手札 | 学习博客</title>
    <meta
      name="description"
      content="记录计算机科学与软件工程学习成果的夏日岛屿风格个人博客。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div id="bg-layer" aria-hidden="true">
      <video id="bg-video" autoplay muted loop playsinline preload="metadata"></video>
      <div id="bg-image"></div>
      <div class="bg-overlay"></div>
      <div class="noise-overlay"></div>
    </div>

    <canvas id="fx-canvas" aria-hidden="true"></canvas>
    <div id="custom-cursor" aria-hidden="true"></div>

    <header class="top-nav glass">
      <div class="brand">夏屿手札</div>
      <nav>
        <a href="#" data-category="all" class="category-link active">全部</a>
        <a href="#" data-category="学习笔记" class="category-link">学习笔记</a>
        <a href="#" data-category="算法" class="category-link">算法</a>
        <a href="#" data-category="工程实践" class="category-link">工程实践</a>
        <a href="#about">关于</a>
      </nav>
      <button id="open-settings" class="ghost-btn">自定义背景</button>
    </header>

    <main class="layout">
      <section class="content-column" id="parallax-content">
        <h1 class="hero-title">在海风里编程，在晚霞里复盘</h1>
        <p class="hero-subtitle">
          每日记录计算机科学与软件工程学习成果，沉浸于夏日岛屿般的清澈与宁静。
        </p>
        <div id="post-list" class="post-list"></div>
      </section>

      <aside class="sidebar glass">
        <section>
          <h3>岛屿档案</h3>
          <p>
            专注计算机科学基础、算法、系统设计与工程实践。
          </p>
        </section>
        <section>
          <h3>热门标签</h3>
          <div id="tag-cloud" class="tag-cloud"></div>
        </section>
        <section>
          <h3>最近更新</h3>
          <ul id="recent-list" class="recent-list"></ul>
        </section>
      </aside>
    </main>

    <footer class="site-footer glass" id="about">
      <p>© <span id="year"></span> 夏屿手札 · 以热爱抵达远方</p>
      <p>
        社交：
        <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
      </p>
    </footer>

    <section id="settings-panel" class="settings-panel glass" aria-hidden="true">
      <div class="settings-header">
        <h2>沉浸设置</h2>
        <button id="close-settings" class="ghost-btn">关闭</button>
      </div>

      <div class="setting-group">
        <h4>预设背景</h4>
        <div id="preset-grid" class="preset-grid"></div>
      </div>

      <div class="setting-group">
        <h4>上传自定义背景</h4>
        <input id="upload-bg" type="file" accept="image/*,video/*" />
        <p class="hint">支持图片/视频，建议小于 4MB（用于本地存储持久化）。</p>
      </div>

      <div class="setting-group">
        <h4>鼠标风格</h4>
        <label>
          蝴蝶尺寸
          <input id="cursor-size" type="range" min="24" max="72" value="40" />
        </label>
        <label>
          尾迹强度
          <input id="trail-density" type="range" min="4" max="20" value="10" />
        </label>
        <label>
          尾迹颜色
          <input id="trail-color" type="color" value="#7dd8ff" />
        </label>
        <label>
          点击波纹颜色
          <input id="click-color" type="color" value="#9ad9ff" />
        </label>
      </div>
    </section>

    <section class="audio-dock glass" aria-label="音频控制">
      <div class="audio-row">
        <button id="toggle-music" class="audio-btn">播放音乐</button>
        <input id="music-volume" type="range" min="0" max="1" step="0.01" value="0.35" />
      </div>
      <div class="audio-row">
        <button id="toggle-ambient" class="audio-btn">播放环境音</button>
        <input id="ambient-volume" type="range" min="0" max="1" step="0.01" value="0.45" />
      </div>
      <p id="audio-tip" class="hint">首次交互后可播放音频。可替换 assets/audio 下文件自定义音色。</p>
    </section>

    <audio id="music-audio" loop preload="none" src="assets/audio/bgm.mp3"></audio>
    <audio id="ambient-audio" loop preload="none" src="assets/audio/ambient.mp3"></audio>

    <script src="scripts/core.js"></script>
    <script src="scripts/app.js"></script>
  </body>
</html>
